{{- if .Values.route.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.app_name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.app_name }}
  {{- with .Values.route.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.route.parentRefs }}
  parentRefs:
    {{- toYaml .Values.route.parentRefs | nindent 4 }}
  {{- else }}
  parentRefs:
    - name: {{ .Values.route.gatewayName | default "nginx-gateway" }}
      namespace: {{ .Values.route.gatewayNamespace | default "gateway-system" }}
      kind: Gateway
      group: gateway.networking.k8s.io
  {{- end }}
  {{- if .Values.route.hostnames }}
  hostnames:
    {{- toYaml .Values.route.hostnames | nindent 4 }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      port: {{ .Values.route.port | default 80 }}
      backendRefs:
        - name: {{ .Values.app_name }}
          port: {{ .Values.service.port }}
      {{- if .Values.route.timeouts }}
      {{- if .Values.route.timeouts.backendRequest }}
      timeouts:
        backendRequest: {{ .Values.route.timeouts.backendRequest | quote }}
      {{- end }}
      {{- end }}
{{- end }}
