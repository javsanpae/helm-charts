apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.app_name }}-worker
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.app_name }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.app_name }}
      app.kubernetes.io/component: worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.app_name }}
        app.kubernetes.io/component: worker
    spec:
      dnsPolicy: ClusterFirst
      dnsConfig:
        nameservers: {{- range .Values.dns }}
          - {{ . | quote }}
        {{- end }}
      containers:
        - name: {{ .Values.app_name }}-worker
          image: {{ .Values.container.registry }}{{ .Values.container.image }}:{{ .Values.container.tag }}
          imagePullPolicy: IfNotPresent
          command: {{- toYaml .Values.worker.command | nindent 12 }}
          env:
            - name: RAILS_ENV
              value: production
            - name: RAILS_LOG_TO_STDOUT
              value: "true"
            - name: DATABASE_URL
              {{- if .Values.postgresql.external }}
              value: postgresql://{{ .Values.postgresql.username }}:$(POSTGRES_PASSWORD)@{{ .Values.postgresql.host }}:{{ .Values.postgresql.port }}/{{ .Values.postgresql.database }}
              {{- else }}
              value: postgresql://{{ .Values.postgresql.username }}:$(POSTGRES_PASSWORD)@{{ .Values.postgresql.bundled.primary.host }}:5432/{{ .Values.postgresql.database }}
              {{- end }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.passwordSecret }}
                  key: {{ .Values.postgresql.passwordSecretKey | default "password" }}
            - name: REDIS_URL
              {{- if .Values.redis.external }}
              value: {{ .Values.redis.url | quote }}
              {{- else if .Values.redis.bundled.enabled }}
              value: redis://{{ .Values.app_name }}-redis:{{ .Values.redis.bundled.primary.port }}/0
              {{- end }}
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app_secret.secretKeyBase.secretName }}
                  key: {{ .Values.app_secret.secretKeyBase.secretKey | default "secret-key-base" }}
            - name: APP_HOST
              value: {{ .Values.web.binding | default "0.0.0.0" }}
            - name: APP_PORT
              value: {{ .Values.web.port | default 3000 | quote }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          {{- if .Values.worker.securityContext }}
          securityContext:
            {{- toYaml .Values.worker.securityContext | nindent 12 }}
          {{- end }}
          {{- if .Values.appStorage.enabled }}
          volumeMounts:
            - name: app-storage
              mountPath: /app/storage
          {{- end }}
      {{- if .Values.appStorage.enabled }}
      volumes:
        - name: app-storage
          persistentVolumeClaim:
            claimName: {{ .Values.app_name }}-storage
      {{- end }}
