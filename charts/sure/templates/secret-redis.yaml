{{- if and (not .Values.redis.external) .Values.redis.bundled.enabled .Values.redis.bundled.primary.password }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.app_name }}-redis
  namespace: {{ .Values.namespace }}
type: Opaque
data:
  REDIS_PASSWORD: {{ .Values.redis.bundled.primary.password | b64enc }}
{{- end }}
