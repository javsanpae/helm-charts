# app_name is used for all resource naming
app_name: sure

# ---------------------------------------------------------------------------
# Namespace
# ---------------------------------------------------------------------------
namespace: sure

# ---------------------------------------------------------------------------
# Container image
# ---------------------------------------------------------------------------
container:
  registry: ghcr.io/
  image: we-promise/sure
  tag: stable

# ---------------------------------------------------------------------------
# Web deployment
# ---------------------------------------------------------------------------
web:
  replicas: 1
  port: 3000
  binding: "0.0.0.0"  # Set to "::" for IPv6 dual-stack
  resources: {}
  # resources:
  #   requests:
  #     cpu: 100m
  #     memory: 256Mi
  #   limits:
  #     cpu: 500m
  #     memory: 1Gi
  securityContext: {}
  # securityContext:
  #   runAsNonRoot: true
  #   readOnlyRootFilesystem: true
  livenessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

# ---------------------------------------------------------------------------
# Worker deployment (Sidekiq)
# ---------------------------------------------------------------------------
worker:
  replicas: 1
  command: ["bundle", "exec", "sidekiq"]
  resources: {}
  # resources:
  #   requests:
  #     cpu: 100m
  #     memory: 256Mi
  #   limits:
  #     cpu: 500m
  #     memory: 1Gi
  securityContext: {}

# ---------------------------------------------------------------------------
# PostgreSQL
# ---------------------------------------------------------------------------
# Set external=true to use an existing PostgreSQL instance (e.g. CloudNativePG).
# Set external=false to deploy the bundled PostgreSQL 16 chart.
postgresql:
  external: false
  # ---- External PostgreSQL (set when postgresql.external = true) ----
  host: ""
  port: 5432
  database: sure_production
  username: sure_user
  passwordSecret: ""
  passwordSecretKey: "password"
  # ---- Bundled PostgreSQL (set when postgresql.external = false) ----
  bundled:
    image:
      registry: docker.io
      repository: library/postgres
      tag: "16"
    primary:
      host: "{{ .Values.app_name }}-postgresql"
      persistence:
        enabled: true
        size: 10Gi
      resources: {}
    healthCheck:
      interval: 5
      timeout: 5
      retries: 5

# ---------------------------------------------------------------------------
# Redis
# ---------------------------------------------------------------------------
# Set external=true to use an existing Redis instance.
# Set external=false to deploy the bundled Redis chart.
redis:
  external: false
  host: ""
  # ---- External Redis (set when redis.external = true) ----
  url: "sure-redis.sure.svc.cluster.local"
  passwordSecret: "sure-redisdb-credentials"
  passwordSecretKey: "REDIS_PASSWORD"
  # ---- Bundled Redis (set when redis.external = false and redis.bundled.enabled = true) ----
  bundled:
    enabled: true
    image:
      registry: docker.io
      repository: library/redis
      tag: "7"
    primary:
      host: "{{ .Values.app_name }}-redis"
      port: 6379
      persistence:
        enabled: true
        size: 1Gi
      resources: {}
    healthCheck:
      interval: 5
      timeout: 5
      retries: 5

# ---------------------------------------------------------------------------
# Application secrets (SECRET_KEY_BASE)
# ---------------------------------------------------------------------------
# Generate your own key:
#   openssl rand -hex 64
# Then create a secret:
#   kubectl create secret generic sure-secret-key --from-literal=secret-key-base=<YOUR_KEY>
app_secret:
  secretKeyBase:
    secretName: ""
    secretKey: "secret-key-base"

# ---------------------------------------------------------------------------
# Application storage (Rails / Active Storage)
# ---------------------------------------------------------------------------
appStorage:
  enabled: true
  size: 5Gi
  storageClass: ""

# ---------------------------------------------------------------------------
# Service (web)
# ---------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 80
  targetPort: 3000

# ---------------------------------------------------------------------------
# Gateway API / HTTPRoute
# ---------------------------------------------------------------------------
route:
  enabled: false
  annotations: {}
  # Hostnames to match (e.g. "sure.example.com"). Empty = matches all.
  hostnames: []
  # Gateway to attach to (omit to use the default below).
  # parentRefs:
  #   - name: my-gateway
  #     namespace: gateway-system
  #     kind: Gateway
  #     group: gateway.networking.k8s.io
  gatewayName: nginx-gateway
  gatewayNamespace: gateway-system
  port: 80
  # Optional: backend request timeout (e.g. "10s", "1m")
  # timeouts:
  #   backendRequest: "10s"

# ---------------------------------------------------------------------------
# DNS (applied to all pods)
# ---------------------------------------------------------------------------
dns:
  - 8.8.8.8
  - 1.1.1.1

# ---------------------------------------------------------------------------
# Backup CronJob (optional, mirrors docker-compose backup service)
# ---------------------------------------------------------------------------
backup:
  enabled: false
  image:
    registry: docker.io
    repository: prodrigestivill/postgres-backup-local
    tag: latest
  schedule: "0 0 * * *"       # Runs daily at midnight
  postgresHost: ""            # Override: defaults to postgresql.host when external
  postgresDatabase: ""        # Override: defaults to postgresql.database
  postgresUser: ""            # Override: defaults to postgresql.username
  passwordSecret: ""          # Override: secret containing postgres password
  passwordSecretKey: "password"
  retention:
    keepDays: 7
    keepWeeks: 4
    keepMonths: 6
  backupVolume:
    size: 10Gi
    storageClass: ""
  resources: {}
