apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.app_name }}-web-route
  namespace: {{ .Values.app_name }}
spec:
  parentRefs:
  {{ - range .Values.route.parent_refs }}
  - {{ . }}
  {{ - end }}
  hostnames:
  {{- range .Values.route.hostnames }}
  - {{ . }}
  {{- end }}
  rules:
  - backendRefs:
    - name: {{ .Values.app_name }}-web-svc
      port: 80